lex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">How do I get started?<svg id=\"icon-faq-0-4\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-0-4\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>It takes less than 5 minutes:<br/>1. Go to <strong class=\"font-semibold text-white\">noblefunded.com<\/strong> and click \"Get Funded\"<br/>2. Choose your account type \u2014 <strong class=\"font-semibold text-white\">Naira<\/strong> or <strong class=\"font-semibold text-white\">Dollar<\/strong><br/>3. Select your account size<br/>4. Pay the challenge fee \u2014 Naira bank transfer, card, or crypto<br/>5. Receive your MT5 login via email within 24 hours<br/>6. Start trading and pass the evaluation at your own pace<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('0-5')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Do I need to know how to trade before joining?<svg id=\"icon-faq-0-5\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-0-5\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>Yes. Noble Funded is an evaluation \u2014 it tests your existing trading skills. We are not a trading school or signal service.<br/>However, you do not need to be a professional. If you have been trading on demo for a while and you have a strategy that works, you are ready to try our challenge. If you are still learning, we recommend joining our free Discord and Telegram communities first where experienced Nigerian traders share analysis and tips daily.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('0-6')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">What platforms can I trade on?<svg id=\"icon-faq-0-6\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-0-6\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>Noble Funded uses <strong class=\"font-semibold text-white\">MetaTrader 5 (MT5)<\/strong> for all trading. MT5 is available on desktop (Windows/Mac), web browser, and mobile (iOS/Android). You will receive your MT5 login details via email after purchasing your challenge.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('0-7')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Which markets can I trade?<svg id=\"icon-faq-0-7\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-0-7\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>You can trade 150+ instruments:<br/>- <strong class=\"font-semibold text-white\">Forex:<\/strong> All major, minor, and exotic pairs (EUR/USD, GBP/USD, USD/JPY, and more)<br/>- <strong class=\"font-semibold text-white\">Gold & Silver:<\/strong> XAUUSD, XAGUSD<br/>- <strong class=\"font-semibold text-white\">Indices:<\/strong> US30, NAS100, S&P500, UK100, GER40<br/>- <strong class=\"font-semibold text-white\">Commodities:<\/strong> Oil (WTI, Brent), Natural Gas<br/>- <strong class=\"font-semibold text-white\">Crypto CFDs:<\/strong> BTC/USD, ETH/USD<br/>- <strong class=\"font-semibold text-white\">Stocks:<\/strong> Select US and global stocks<br/>Gold (XAUUSD) is the most popular instrument among our Nigerian traders.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('0-8')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Can I trade from Nigeria?<svg id=\"icon-faq-0-8\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-0-8\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>Absolutely. Noble Funded was built for Nigerian traders. Pay in Naira, get xt-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg\"><tbody><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\">Tier<\/td><td class=\"p-3\">Profit Range<\/td><td class=\"p-3\">Amount<\/td><td class=\"p-3\">Your Share<\/td><td class=\"p-3\">You Get<\/td><\/tr><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\">Tier 1 (80/20)<\/td><td class=\"p-3\">\u20a60 \u2192 \u20a6200,000<\/td><td class=\"p-3\">\u20a6200,000<\/td><td class=\"p-3\">80%<\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a6160,000<\/strong><\/td><\/tr><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\">Tier 2 (60/40)<\/td><td class=\"p-3\">\u20a6200,000 \u2192 \u20a6400,000<\/td><td class=\"p-3\">\u20a6200,000<\/td><td class=\"p-3\">60%<\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a6120,000<\/strong><\/td><\/tr><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\"><strong class=\"font-semibold text-white\">TOTAL<\/strong><\/td><td class=\"p-3\"><\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a6400,000<\/strong><\/td><td class=\"p-3\"><\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a6280,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\u2705 You take home <strong class=\"font-semibold text-white\">\u20a6280,000<\/strong> from your \u20a6200,000 account.<strong class=\"font-semibold text-white\">Example 4 \u2014 \u20a63,000,000 Account, you make 120% (\u20a63,600,000 profit):<\/strong>The first \u20a63,000,000 (100%) is split 80/20. The extra \u20a6600,000 (the 20% above 100%) is split 60/40.<div class=\"w-full overflow-x-auto my-4\"><table class=\"w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg\"><tbody><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\">Tier<\/td><td class=\"p-3\">Profit Range<\/td><td class=\"p-3\">Amount<\/td><td class=\"p-3\">Your Share<\/td><td class=\"p-3\">You Get<\/td><\/tr><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\">Tier 1 (80/20)<\/td><td class=\"p-3\">\u20a60 \u2192 \u20a63,000,000<\/td><td class=\"p-3\">\u20a63,000,000<\/td><td class=\"p-3\">80%<\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a62,400,000<\/strong><\/td><\/tr><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\">Tier 2 (60/40)<\/td><td class=\"p-3\">\u20a63,000,000 \u2192 \u20a63,600,000<\/td><td class=\"p-3\">\u20a6600,000<\/td><td class=\"p-3\">60%<\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a6360,000<\/strong><\/td><\/tr><tr class=\"border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors\"><td class=\"p-3\"><strong class=\"font-semibold text-white\">TOTAL<\/strong><\/td><td class=\"p-3\"><\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a63,600,000<\/strong><\/td><td class=\"p-3\"><\/td><td class=\"p-3\"><strong class=\"font-semibold text-white\">\u20a62,760,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\u2705 You take home <strong class=\"font-semibold text-white\">\u20a62,760,000<\/strong>. It does not matter if the extra profit above 100% is \u20a610,000 or \u20a63,000,000 \u2014 everything above the first 100% is always split 60/40.<strong class=\"font-semibold text-white\">What happens if I make more than 200% profit?<\/strong>It is not counted. Example: \u20a6800,000 account, you make \u20a62,000,000 profit (250%). Only \u20a61,600,000 (200%) is calculated. The extra \u20a6400,000 is ignored. Your maximum payout remains \u20a61,120,000.After reaching 200%, your account is complete. You receive your final payout and the account closes.<strong class=\"font-semibold text-white\">\ud83c\uddfa\ud83c\uddf8 Dollar Account \u2014 Standard Profit Split:<\/strong>Dollar accounts have a simple <strong class=\"font-semibold text-white\">80/20<\/strong> profit split. You keep 80%, Noble Funded keeps 20%. There is no profit cap on Dollar accounts. Your profit split can scale up to 90% as you grow through the scaling programme.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('1-3')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">How do I receive my money?<svg id=\"icon-faq-1-3\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-1-3\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">\ud83c\uddf3\ud83c\uddec Naira Account Payouts:<\/strong><br/>- Direct bank transfer to your Nigerian bank account in Naira (\u20a6)<br/>- Processed within 24 hours<br/><strong class=\"font-semibold text-white\">\ud83c\uddfa\ud83c\uddf8 Dollar Account Payouts:<\/strong><br/>- Cryptocurrency (USDT) to your wallet<br/>- Bank transfer in USD (where available)<br/>- Processed bi-weekly (every 2 weeks)<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('1-4')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Is there a minimum amount before I can request a payout?<svg id=\"icon-faq-1-4\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-1-4\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">\ud83c\uddf3\ud83c\uddec Naira Accounts:<\/strong> Yes. You must have at least <strong class=\"font-semibold text-white\">10% of your account size<\/strong> as profit inside your account before you can request a payout.<br/>Example: \u20a6800,000 account \u2192 you need at least \u20a680,000 in profit before your first withdrawal.<br/>Example: \u20a6200,000 account \u2192 you need at least \u20a620,000 in profit before your first withdrawal.<br/>Example: \u20a63,000,000 account \u2192 you need at least \u20a6300,000 in profit before your first withdrawal.<br/><strong class=\"font-semibold text-white\">\ud83c\uddfa\ud83c\uddf8 Dollar Accounts:<\/strong> Minimum payout is <strong class=\"font-semibold text-white\">$50<\/strong>.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('1-5')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Do I get my challenge fee refunded?<svg id=\"icon-faq-1-5\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-1-5\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">No. All challenge fees are non-refundable.<\/strong> This applies to both Naira and Dollar accounts. Whether you pass, fail, or choose not to trade, the challenge fee will not be returned. Please ensure you are ready before purchasing.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('1-6')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Can I lose my funded account?<svg id=\"icon-faq-1-6\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-1-6\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>Yes. Your funded account will be terminated if you:<br/>- Exceed the maximum drawdown (20% for Naira, 10% for Dollar)<br/>- Exceed the daily drawdown (Dollar accounts only \u2014 3%)<br/>- Violate any Prohibited Trading Practice (including weekend holding, news trading, or using bots)<br/>- Go 30 days without placing a single trade<br/>If your account is terminated, you can purchase a new challenge and start again. No refund is given for terminated accounts.<\/p><\/div><\/div><\/div><\/div><\/div><\/div><div id=\"tab-rules\" class=\"faq-tab-content-orig\" style=\"display: none;\"><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-0')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">What happens after I reach 200% profit on my Naira account?<svg id=\"icon-faq-2-0\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-0\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>Once you reach 200% profit on your Naira account, the account is complete. Any profit above 200% is not counted. You receive your final payout (split according to the two-tier system) and the account is closed. You can then purchase a new challenge if you wish to continue trading with Noble Funded.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-1')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">What trading strategies are NOT allowed?<svg id=\"icon-faq-2-1\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-1\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>The following are prohibited on <strong class=\"font-semibold text-white\">ALL<\/strong> Noble Funded accounts (Naira and Dollar), on <strong class=\"font-semibold text-white\">BOTH<\/strong> Challenge and Funded accounts:<br/>- \u274c <strong class=\"font-semibold text-white\">Weekend Holding<\/strong> \u2014 All trades MUST be closed before the market closes on Friday. You cannot hold any position over the weekend.<br/>- \u274c <strong class=\"font-semibold text-white\">News Trading<\/strong> \u2014 You cannot trade during high-impact news events. No opening or closing trades around major news releases (NFP, FOMC, CPI, ECB, etc.)<br/>- \u274c <strong class=\"font-semibold text-white\">Expert Advisors (EAs) / Bots<\/strong> \u2014 All trading must be manual. No automated trading of any kind.<br/>- \u274c <strong class=\"font-semibold text-white\">Copy Trading<\/strong> \u2014 You cannot mirror trades from other traders or accounts<br/>- \u274c <strong class=\"font-semibold text-white\">Latency Arbitrage<\/strong> \u2014 Exploiting price feed delays<br/>- \u274c <strong class=\"font-semibold text-white\">High-Frequency Trading (HFT)<\/strong> \u2014 Ultra-fast automated systems<br/>- \u274c <strong class=\"font-semibold text-white\">Grid Trading<\/strong> \u2014 Placing buy/sell orders at equal intervals without direction<br/>- \u274c <strong class=\"font-semibold text-white\">Tick Scalping<\/strong> \u2014 Opening and closing within seconds repeatedly<br/>- \u274c <strong class=\"font-semibold text-white\">Account Sharing<\/strong> \u2014 Letting someone else trade your account<br/>- \u274c <strong class=\"font-semibold text-white\">Group Trading<\/strong> \u2014 Coordinating trades across accounts with other traders<br/>- \u274c <strong class=\"font-semibold text-white\">Over-leveraging<\/strong> \u2014 Using excessive margin without risk management<br/><strong class=\"font-semibold text-white\">Additional restriction for \ud83c\uddf3\ud83c\uddec Naira Accounts only:<\/strong><br/>- \u274c <strong class=\"font-semibold text-white\">No scalping under 3 minutes<\/strong> \u2014 Every trade must be held for at least 3 minutes<br/>These rules apply at ALL times \u2014 during the Challenge AND on Funded accounts. There are no exceptions.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-2')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Can I hold trades over the weekend?<svg id=\"icon-faq-2-2\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-2\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">No. Weekend holding is NOT allowed on any Noble Funded account.<\/strong> This applies to both Naira and Dollar accounts, and during both the Challenge and Funded stages.<br/>You must close ALL open positions before the market closes on Friday. If you leave trades open over the weekend, it is a rule violation and may result in trade removal, profit deduction, or account termination.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-3')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Can I trade during news events?<svg id=\"icon-faq-2-3\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-3\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">No. News trading is NOT allowed on any Noble Funded account.<\/strong> This applies to both Naira and Dollar accounts, and during both the Challenge and Funded stages.<br/>You cannot open or close trades around high-impact news events such as NFP (Non-Farm Payrolls), FOMC interest rate decisions, CPI data releases, ECB decisions, and other major economic events. If profits are detected from trades placed around news events, they will be deducted from your payout.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-4')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">Are Expert Advisors (EAs) and bots allowed?<svg id=\"icon-faq-2-4\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-4\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">No. EAs, trading bots, automated scripts, and any form of algorithmic trading are completely prohibited on ALL Noble Funded accounts.<\/strong> This applies to both Naira and Dollar accounts, and during both the Challenge and Funded stages.<br/>All trades must be placed manually by you. If we detect automated trading on your account, it will be terminated immediately with no refund.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-5')\" class=\"focus-visible:b cap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-7\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p>1. <strong class=\"font-semibold text-white\">First violation:<\/strong> Offending trades may be removed and profits deducted<br/>2. <strong class=\"font-semibold text-white\">Repeated violations:<\/strong> Account terminated without refund<br/>3. <strong class=\"font-semibold text-white\">Severe violations:<\/strong> Permanent ban from Noble Funded<br/>Noble Funded reviews all trading activity and reserves the right to terminate accounts at our sole discretion.<\/p><\/div><\/div><\/div><\/div><\/div><div class=\"border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden\"><h3 class=\"flex font-normal m-0 relative\"><button type=\"button\" onclick=\"window.toggleAccordion('2-8')\" class=\"focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none\">When do I need to complete KYC?<svg id=\"icon-faq-2-8\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light\" style=\"transform: rotate(0deg);\"><path d=\"m6 9 6 6 6-6\"></path><\/svg><\/button><\/h3><div id=\"content-faq-2-8\" class=\"overflow-hidden transition-all duration-300 ease-in-out\" style=\"max-height: 0px;\"><div class=\"pb-4 pt-0\"><div class=\"text-xs sm:text-sm font-light leading-10\"><div class=\"text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]\"><p><strong class=\"font-semibold text-white\">\ud83c\uddf3\ud83c\uddec Naira Accounts:<\/strong> KYC verification happens <strong class=\"font-semibold text-white\">after you pass<\/strong> the challenge. You do not need to submit documents before trading.<br/><strong class=\"font-semibold text-white\">\ud83c\uddfa\ud83c\uddf8 Dollar Accounts:<\/strong> KYC verification is required <strong class=\"font-semibold text-white\">before your first payout<\/strong> from the funded account.<br/>Accepted documents: NIN (National Identity Number), International Passport, Driver's Licence, Voter's Card. Proof of address: Utility bill or bank statement (not older than 3 months).<\/p><\/div><\/div><\/div><\/div><\/div><\/div><\/div><\/div>";

-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">What is the Naira Challenge Account?<svg id="icon-rules-0-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-0" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>The Naira Challenge Account is Noble Funded\'s flagship product built exclusively for Nigerian traders. Everything is in Naira — you pay in Naira, you trade in Naira, and you get paid in Naira. No dollar conversions, no wahala.It is a 2-phase evaluation. Pass both phases and receive your funded account. Trade the funded account, make profit, and request payouts within 24 hours.<strong class="font-semibold text-white">Account Sizes Available:<\/strong>₦200,000 | ₦400,000 | ₦600,000 | ₦800,000 | ₦1,000,000 | ₦3,000,000<strong class="font-semibold text-white">Challenge Fees (Non-Refundable):<\/strong><div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Account Size<\/td><td class="p-3">Challenge Fee<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦200,000<\/td><td class="p-3">₦10,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦400,000<\/td><td class="p-3">₦19,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦600,000<\/td><td class="p-3">₦29,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦800,000<\/td><td class="p-3">₦39,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦1,000,000<\/td><td class="p-3">₦54,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦3,000,000<\/td><td class="p-3">₦190,000<\/td><\/tr><\/tbody><\/table><\/div><\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-1')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Profit Target<svg id="icon-rules-0-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-1" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">Phase 1:<\/strong> 10% of your account size<strong class="font-semibold text-white">Phase 2:<\/strong> 10% of your account size<div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Account Size<\/td><td class="p-3">Phase 1 Target (10%)<\/td><td class="p-3">Phase 2 Target (10%)<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦200,000<\/td><td class="p-3">₦20,000<\/td><td class="p-3">₦20,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦400,000<\/td><td class="p-3">₦40,000<\/td><td class="p-3">₦40,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦600,000<\/td><td class="p-3">₦60,000<\/td><td class="p-3">₦60,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦800,000<\/td><td class="p-3">₦80,000<\/td><td class="p-3">₦80,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦1,000,000<\/td><td class="p-3">₦100,000<\/td><td class="p-3">₦100,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦3,000,000<\/td><td class="p-3">₦300,000<\/td><td class="p-3">₦300,000<\/td><\/tr><\/tbody><\/table><\/div>Profit must be from closed trades. Floating/open profit does not count.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-2')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Maximum Drawdown<svg id="icon-rules-0-2" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-2" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>Maximum drawdown on Naira accounts is <strong class="font-semibold text-white">20%<\/strong>. If your equity drops below this level, your account is terminated.<div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Account Size<\/td><td class="p-3">Max Drawdown (20%)<\/td><td class="p-3">Account Terminates Below<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦200,000<\/td><td class="p-3">₦40,000<\/td><td class="p-3">₦160,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦400,000<\/td><td class="p-3">₦80,000<\/td><td class="p-3">₦320,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦600,000<\/td><td class="p-3">₦120,000<\/td><td class="p-3">₦480,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦800,000<\/td><td class="p-3">₦160,000<\/td><td class="p-3">₦640,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦1,000,000<\/td><td class="p-3">₦200,000<\/td><td class="p-3">₦800,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦3,000,000<\/td><td class="p-3">₦600,000<\/td><td class="p-3">₦2,400,000<\/td><\/tr><\/tbody><\/table><\/div>There is <strong class="font-semibold text-white">NO daily drawdown<\/strong> on Naira accounts. Only the overall 20% maximum drawdown applies.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-3')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Minimum Trading Days<svg id="icon-rules-0-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-3" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">Minimum 1 trading day<\/strong> per phase. You only need to trade on 1 day to pass each phase — as long as you hit the profit target without breaking the drawdown rule.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-4')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Time Limit<svg id="icon-rules-0-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-4" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">No time limit.<\/strong> Trade at your own pace. However, you must place at least one trade within <strong class="font-semibold text-white">30 days<\/strong> or your account will be disabled.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-5')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Profit Split — The Two-Tier System (IMPORTANT)<svg id="icon-rules-0-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-5" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>On Naira accounts, you can make a <strong class="font-semibold text-white">maximum of 200%<\/strong> of your account size in total profit. The profit split works like this:<strong class="font-semibold text-white">Tier 1 — First 100% of profit = 80/20<\/strong> (you keep 80%)<strong class="font-semibold text-white">Tier 2 — Any profit above 100%, up to the 200% cap = 60/40<\/strong> (you keep 60%)It does not matter how much you make above the first 100% — whether it is ₦10,000 or ₦3,000,000 — everything above 100% is always split 60/40. Anything above 200% is not counted at all.<strong class="font-semibold text-white">EXAMPLE 1 — ₦800,000 Account, full 200% profit (₦1,600,000):<\/strong><div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier<\/td><td class="p-3">Profit Range<\/td><td class="p-3">Amount<\/td><td class="p-3">Split<\/td><td class="p-3">You Get<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 1<\/td><td class="p-3">₦0 → ₦800,000<\/td><td class="p-3">₦800,000<\/td><td class="p-3">80/20<\/td><td class="p-3"><strong class="font-semibold text-white">₦640,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 2<\/td><td class="p-3">₦800,000 → ₦1,600,000<\/td><td class="p-3">₦800,000<\/td><td class="p-3">60/40<\/td><td class="p-3"><strong class="font-semibold text-white">₦480,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3"><strong class="font-semibold text-white">TOTAL<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦1,600,000<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦1,120,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div><strong class="font-semibold text-white">EXAMPLE 2 — ₦800,000 Account, 150% profit (₦1,200,000):<\/strong>First ₦800,000 (100%) → 80/20. The remaining ₦400,000 (50% above the first 100%) → 60/40.<div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier<\/td><td class="p-3">Profit Range<\/td><td class="p-3">Amount<\/td><td class="p-3">Split<\/td><td class="p-3">You Get<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 1<\/td><td class="p-3">₦0 → ₦800,000<\/td><td class="p-3">₦800,000<\/td><td class="p-3">80/20<\/td><td class="p-3"><strong class="font-semibold text-white">₦640,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 2<\/td><td class="p-3">₦800,000 → ₦1,200,000<\/td><td class="p-3">₦400,000<\/td><td class="p-3">60/40<\/td><td class="p-3"><strong class="font-semibold text-white">₦240,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3"><strong class="font-semibold text-white">TOTAL<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦1,200,000<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦880,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div><strong class="font-semibold text-white">EXAMPLE 3 — ₦200,000 Account, full 200% profit (₦400,000):<\/strong><div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier<\/td><td class="p-3">Profit Range<\/td><td class="p-3">Amount<\/td><td class="p-3">Split<\/td><td class="p-3">You Get<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 1<\/td><td class="p-3">₦0 → ₦200,000<\/td><td class="p-3">₦200,000<\/td><td class="p-3">80/20<\/td><td class="p-3"><strong class="font-semibold text-white">₦160,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 2<\/td><td class="p-3">₦200,000 → ₦400,000<\/td><td class="p-3">₦200,000<\/td><td class="p-3">60/40<\/td><td class="p-3"><strong class="font-semibold text-white">₦120,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3"><strong class="font-semibold text-white">TOTAL<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦400,000<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦280,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div><strong class="font-semibold text-white">EXAMPLE 4 — ₦3,000,000 Account, 120% profit (₦3,600,000):<\/strong>First ₦3,000,000 (100%) → 80/20. The extra ₦600,000 (20% above the first 100%) → 60/40.<div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier<\/td><td class="p-3">Profit Range<\/td><td class="p-3">Amount<\/td><td class="p-3">Split<\/td><td class="p-3">You Get<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 1<\/td><td class="p-3">₦0 → ₦3,000,000<\/td><td class="p-3">₦3,000,000<\/td><td class="p-3">80/20<\/td><td class="p-3"><strong class="font-semibold text-white">₦2,400,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 2<\/td><td class="p-3">₦3,000,000 → ₦3,600,000<\/td><td class="p-3">₦600,000<\/td><td class="p-3">60/40<\/td><td class="p-3"><strong class="font-semibold text-white">₦360,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3"><strong class="font-semibold text-white">TOTAL<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦3,600,000<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦2,760,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div><strong class="font-semibold text-white">EXAMPLE 5 — ₦800,000 Account, 110% profit (₦880,000):<\/strong>First ₦800,000 (100%) → 80/20. The extra ₦80,000 (10% above) → 60/40.<div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier<\/td><td class="p-3">Profit Range<\/td><td class="p-3">Amount<\/td><td class="p-3">Split<\/td><td class="p-3">You Get<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 1<\/td><td class="p-3">₦0 → ₦800,000<\/td><td class="p-3">₦800,000<\/td><td class="p-3">80/20<\/td><td class="p-3"><strong class="font-semibold text-white">₦640,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Tier 2<\/td><td class="p-3">₦800,000 → ₦880,000<\/td><td class="p-3">₦80,000<\/td><td class="p-3">60/40<\/td><td class="p-3"><strong class="font-semibold text-white">₦48,000<\/strong><\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3"><strong class="font-semibold text-white">TOTAL<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦880,000<\/strong><\/td><td class="p-3"><\/td><td class="p-3"><strong class="font-semibold text-white">₦688,000<\/strong><\/td><\/tr><\/tbody><\/table><\/div><strong class="font-semibold text-white">What happens above 200%?<\/strong> Not counted. ₦800,000 account making ₦2,000,000 profit (250%)? Only ₦1,600,000 (200%) is calculated. Your payout is still ₦1,120,000. After reaching 200%, the account is complete and closes.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-6')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Minimum Balance Before Payout<svg id="icon-rules-0-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-6" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>Before you can request any payout, you must have <strong class="font-semibold text-white">at least 10% of your account size<\/strong> as profit in your account.<div class="w-full overflow-x-auto my-4"><table class="w-full text-left text-xs sm:text-sm text-[#A7FFEB] border border-[#A7FFEB]/20 rounded-lg"><tbody><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">Account Size<\/td><td class="p-3">Minimum Profit Before Payout<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦200,000<\/td><td class="p-3">₦20,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦400,000<\/td><td class="p-3">₦40,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦600,000<\/td><td class="p-3">₦60,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦800,000<\/td><td class="p-3">₦80,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦1,000,000<\/td><td class="p-3">₦100,000<\/td><\/tr><tr class="border-b border-[#A7FFEB]/20 hover:bg-[#A7FFEB]/5 transition-colors"><td class="p-3">₦3,000,000<\/td><td class="p-3">₦300,000<\/td><\/tr><\/tbody><\/table><\/div><\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-7')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Payout Method<svg id="icon-rules-0-7" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-7" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">Frequency:<\/strong> Anytime — processed within <strong class="font-semibold text-white">24 hours<\/strong><br/><strong class="font-semibold text-white">Method:<\/strong> Direct bank transfer to your Nigerian bank account in <strong class="font-semibold text-white">Naira (₦)<\/strong><\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-8')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">KYC Verification<svg id="icon-rules-0-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-8" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>KYC is done <strong class="font-semibold text-white">after you pass the challenge<\/strong> — not before. Once you pass, you submit:<br/>- Government ID: NIN, Passport, Driver\'s Licence, or Voter\'s Card<br/>- Proof of address: Utility bill or bank statement (not older than 3 months)<br/>- Selfie verification<br/>You must complete KYC before your first payout.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-9')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">No Scalping Under 3 Minutes<svg id="icon-rules-0-9" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-9" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>Every trade must be held for <strong class="font-semibold text-white">at least 3 minutes<\/strong>. You cannot open and close within 1-3 minutes.<br/>- ✅ Hold for 3+ minutes — allowed<br/>- ❌ Hold for less than 3 minutes — NOT allowed<br/>Violations: trades removed, profits deducted. Repeated: account terminated.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-10')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">No Expert Advisors (EAs) or Bots<svg id="icon-rules-0-10" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-10" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">ALL trading must be manual.<\/strong> No EAs, no bots, no automated scripts. This applies during the Challenge AND on the Funded account. If automated trading is detected, immediate termination with no refund.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-11')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">No Weekend Holding<svg id="icon-rules-0-11" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-11" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">ALL trades must be closed before the market closes on Friday.<\/strong> You cannot carry any open position into Saturday or Sunday. This applies during the Challenge AND on the Funded account.<br/>If you leave trades open over the weekend, it is a rule violation.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-12')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">No News Trading<svg id="icon-rules-0-12" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-12" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">You cannot trade during high-impact news events.<\/strong> No opening or closing trades around NFP, FOMC, CPI, ECB, or any other major economic releases. This applies during the Challenge AND on the Funded account.<br/>If profits are detected from news trading, they will be deducted from your payout.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-13')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Account Inactivity<svg id="icon-rules-0-13" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-13" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p>You must place at least <strong class="font-semibold text-white">one trade every 30 days<\/strong>. If you go 30 days without a trade, your account is disabled. Contact support@noblefunded.com within 6 months to reactivate. After 6 months, the account is permanently closed with no refund.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-14')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 text-sm font-medium transition-all outline-none md:text-xl sm:text-lg cursor-pointer w-full text-left bg-transparent border-none">Refund Policy<svg id="icon-rules-0-14" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-muted-foreground shrink-0 transition-transform duration-200 text-white w-8 h-8 font-light" style="transform: rotate(0deg);"><path d="m6 9 6 6 6-6"></path><\/svg><\/button><\/h3><div id="content-rules-0-14" class="overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 0px;"><div class="pb-4 pt-0"><div class="text-xs sm:text-sm font-light leading-10"><div class="text-xs sm:text-sm font-light leading-10 text-[#A7FFEB]"><p><strong class="font-semibold text-white">All Naira challenge fees are non-refundable.<\/strong> No exceptions.<\/p><\/div><\/div><\/div><\/div><\/div><div class="border p-3 border-[#A7FFEB]/20 rounded-2xl last:border-b-0 bg-[#002B36] mt-4 overflow-hidden"><h3 class="flex font-normal m-0 relative"><button type="button" onclick="window.toggleAccordion('0-15')" class="focus-visible:border-ring text-[#A7FFEB] focus-visible:ring-ring/50 flex flex-1 items-center justify-between py-4 t     // Account size text → checkout plan ID mapping
    var PLAN_MAP_NOBLE = {
        '\u20a6200,000': 'ngn-200k', '\u20a6400,000': 'ngn-400k', '\u20a6600,000': 'ngn-600k',
        '\u20a6800,000': 'ngn-800k', '\u20a61,000,000': 'ngn-1m', '\u20a63,000,000': 'ngn-3m',
        '$5K': 'usd-5k', '$10K': 'usd-10k', '$25K': 'usd-25k',
        '$50K': 'usd-50k', '$100K': 'usd-100k', '$200K': 'usd-200k',
    };

    function getPlanFromCard(cardEl) {
        var text = cardEl ? (cardEl.innerText || cardEl.textContent || '') : '';
        var keys = Object.keys(PLAN_MAP_NOBLE);
        for (var i = 0; i < keys.length; i++) {
            if (text.indexOf(keys[i]) !== -1) return PLAN_MAP_NOBLE[keys[i]];
        }
        return null;
    }

    function patchGetFundedButtons() {
        var allEls = document.querySelectorAll('a:not([data-checkout-patched]), button:not([data-checkout-patched])');
        allEls.forEach(function(el) {
            var txt = (el.textContent || el.innerText || '').trim();
            if (txt.indexOf('Get Funded Now') === -1 && txt !== 'Get Funded') return;
            el.setAttribute('data-checkout-patched', '1');
            el.addEventListener('click', function(e) {
                var node = el;
                for (var i = 0; i < 15; i++) {
                    if (!node.parentElement) break;
                    node = node.parentElement;
                    if (node.tagName === 'SECTION' || node.tagName === 'BODY') break;
                    var plan = getPlanFromCard(node);
                    if (plan) {
                        e.preventDefault(); e.stopPropagation();
                        window.open('https://noble-funded-checkout.vercel.app?plan=' + plan, '_blank');
                        return;
                    }
                }
                e.preventDefault(); e.stopPropagation();
                window.open('https://noble-funded-checkout.vercel.app', '_blank');
            }, true);
        });
    }

    function applyAll() {
        nukeIntercom();
        applyHeaderFooterFixes();
        patchGetFundedButtons();
        if (typeof replaceFaq !== 'undefined') replaceFaq();
        if (typeof replaceRules !== 'undefined') replaceRules();
    }


    // Try multiple hooks to outlast hydration
    if (document.readyState === 'loading') {    
        document.addEventListener('DOMContentLoaded', applyAll);
    } else {
        applyAll();
    }

    setInterval(applyAll, 500);

    var observer = new MutationObserver(applyAll);
    observer.observe(document.documentElement, { childList: true, subtree: true });
})();
